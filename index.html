    <script>
      (function () {
        var progress = 0;
        var trickleId = 0;
        var loaderEl = null;
        var barEl = null;
        var ringEl = null;
        var pctEl = null;
        var ringLen = 289.1;

        function setProgress(v) {
          progress = v < progress ? progress : v;
          if (barEl) barEl.style.width = progress + "%";
          if (ringEl) ringEl.style.strokeDashoffset = String(ringLen * (1 - progress / 100));
          if (pctEl) pctEl.textContent = progress + "%";
        }

        function hideLoader() {
          var loader = loaderEl || document.getElementById("app-loader");
          if (!loader || loader.getAttribute("data-done") === "1") return;
          loader.setAttribute("data-done", "1");
          if (trickleId) window.clearInterval(trickleId);
          setProgress(100);
          document.body.className = document.body.className.replace(/\bis-loading\b/g, "").trim();
          window.setTimeout(function () {
            loader.className = loader.className + " is-hidden";
            window.setTimeout(function () {
              if (loader.parentNode) loader.parentNode.removeChild(loader);
            }, 650);
          }, 180);
        }

        window.__setLoaderProgress = setProgress;
        window.__hideAppLoader = hideLoader;

        document.addEventListener("DOMContentLoaded", function () {
          loaderEl = document.getElementById("app-loader");
          barEl = document.getElementById("app-loader-bar");
          ringEl = document.getElementById("app-loader-ring");
          pctEl = document.getElementById("app-loader-pct");
          document.body.className = (document.body.className + " is-loading").trim();
          setProgress(6);
          trickleId = window.setInterval(function () {
            if (progress < 82) setProgress(progress + (progress < 45 ? 5 : 2));
          }, 450);
          window.setTimeout(hideLoader, 15000);
        });
      })();
    </script>

    <style>
      body.is-loading {

        left: 50%;

        height: 5px;
        margin-left: -2.5px;
        border-radius: 50%;

        box-shadow: 0 0 14px rgba(201, 168, 106, 0.75);
      }

        width: calc(100% - 12px);
        height: calc(100% - 12px);
        -webkit-transform: rotate(-90deg);
